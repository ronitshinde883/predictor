<h2>Eligible Colleges</h2>

<table border="1">
<tr>
    <th>College</th>
    <th>Branch</th>
    <th>Category</th>
    <th>Cutoff Percentile</th>
</tr>

{% for c in colleges %}
<tr>
    <td>{{ c.college.name }}</td>
    <td>{{ c.branch.name }}</td>
    <td>{{ c.category }}</td>
    <td>{{ c.percentile }}</td>
</tr>
{% endfor %}

</table>
