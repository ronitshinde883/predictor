<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
</head>
<body>

<h2>Enter Student Details</h2>

<form method="POST">
    {% csrf_token %}

    <label>Percentile:</label><br>
    <input type="number" step="0.01" name="percentile" required><br><br>

    <label>Category:</label><br>
    <select name="category" required>
        {% for value, label in categories %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
    </select><br><br>

    <label>Home University:</label><br>
    <input type="text" name="home_university" required><br><br>

    <label>Preferred Branch:</label><br>
    <select name="preferred_branch" required>
        {% for branch in branches %}
        <option value="{{ branch.id }}">{{ branch.name }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
