<h2>All Colleges</h2>

<ul>

{% for college in colleges %}

<li onclick="toggleDetails({{ college.id }})" style="cursor:pointer;">
    <b>{{ college.college.name }}</b>

    <div id="detail-{{ college.id }}" style="display:none; margin-left:15px;">
        <p>Fees: {{ college.fees }}</p>
        <p>Average Package: {{ college.average_package }}</p>
        <p>Highest Package: {{ college.highest_package }}</p>
        <p>Hostel: {{ college.hostel_available }}</p>
    </div>

</li>

{% endfor %}

</ul>

<script>
function toggleDetails(id){
    const el = document.getElementById("detail-" + id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>
